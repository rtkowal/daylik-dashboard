        hook: "Precedens: czy demokracja lokalna w Polsce zacznie dzia\u0142a\u0107 jak recall elections w USA? Ale pr\u00f3g frekwencji jest ustawiony tak wysoko, \u017ce referendum prawie nigdy nie jest wi\u0105\u017c\u0105ce.",
        narratives: {

          lewica: "Referendum to narz\u0119dzie demokratyczne \u2014 je\u015bli ludzie chc\u0105 zmiany, maj\u0105 do tego prawo",

        urls: {
          prawica: "https://dorzeczy.pl/opinie/870268/referendum-w-krakowie-miszalski-namawia-do-bojkotu-i-liczy-na-niska-frekwencje.html",
          lewica: "https://oko.press/referendum-bitwa-o-krakow-czyli-dlaczego-tusk-juz-siega-po-plan-b",
          libki: "https://krknews.pl/referendum-w-krakowie-wszystko-co-musisz-o-nim-wiedziec-fakty-liczby-terminy/",
          luka: "https://portalkomunalny.pl/referendum-w-krakowie-w-sprawie-odwolania-prezydenta-i-rady-598927/"
        }
      }
    ],
    bonusy: [
      {
        id: "bonus-1",
        title: "Polska nie jedzie na Mundial 2026 \u2014 memy eksploduj\u0105",
        summary: "Polska przegra\u0142a bara\u017c ze Szwecj\u0105 2:3. Internet: #MundialBezPolski. Tematy: \u2018Polska szwedzki\u2019, por\u00f3wnania do \u2018wiecznego pechowca\u2019."
      },
      {
        id: "bonus-2",
        title: "KSeF od 1 kwietnia \u2014 \u2018to nie Prima Aprilis\u2019",
        summary: "W dniu wej\u015bcia KSeF (1 kwietnia), polscy przedsi\u0119biorcy na X i Wykopie wrzucali memy o \u2018najlepszym primaaprilisowym \u017carcie rz\u0105du\u2019. Hashtag #KSeF trendowa\u0142."
      },
      {
        id: "bonus-3",
        title: "Memy o te\u015bciowych podbijaj\u0105 internet \u2014 nowa fala humoru",
        summary: "Nie stare \u017carty \u2014 nowa fala: \u2018babcia m\u00f3wi \u017ce za jej czas\u00f3w nie by\u0142o depresji, bo nikt nie mia\u0142 czasu na smutki\u2019. Setki tysi\u0119cy udost\u0119pnie\u0144."
      }
    ]
  }
];

// ═══ STATE ═══
let currentBriefIdx = 0;
const decisions = {};

function loadBrief(idx) {
  currentBriefIdx = idx;
  Object.keys(decisions).forEach(k => delete decisions[k]);
  renderSidebar();
  render();
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  let html = '';
  dashboardHistory.forEach((brief, i) => {
    const topicCount = brief.popularne_trendy.length + brief.discovery.length + brief.bonusy.length;
    html += `<a class="sidebar-item ${i === currentBriefIdx ? 'active' : ''}" onclick="loadBrief(${i})">
      <div class="item-date">${brief.label}</div>
      <div class="item-count">${topicCount} temat\u00f3w</div>
    </a>`;
  });
  list.innerHTML = html;
}

function render() {
  const brief = dashboardHistory[currentBriefIdx];
  document.getElementById('briefDate').textContent = brief.date;

  const app = document.getElementById('app');
  let html = '';

  html += '<div class="section-label">POPULARNE TRENDY \u2014 co wszyscy wiedz\u0105, ale nikt nie widzi k\u0105ta</div>';
  brief.popularne_trendy.forEach(t => { html += renderCard(t, 'popularne'); });

  html += '<div class="section-label">DISCOVERY \u2014 tematy pod radarem</div>';
  brief.discovery.forEach(t => { html += renderCard(t, 'discovery'); });

  html += '<div class="section-label">BONUSY \u2014 memy i virale</div>';
  brief.bonusy.forEach(t => { html += renderCard(t, 'bonus', true); });

  html += `
  <div class="general-notes">
    <h3>Og\u00f3lne uwagi, dodatkowe tematy, linki</h3>
    <textarea id="generalNotes" placeholder="Wklej linki, dokumenty, dodatkowe pomys\u0142y, uwagi..."></textarea>
    <div class="hint">To pole trafia do agenta jako kontekst do Phase 2.</div>
  </div>`;

  html += `
  <div class="submit-section">
    <button class="submit-btn" onclick="submitDecisions()">Wy\u015blij do agenta</button>
  </div>`;

  app.innerHTML = html;
  restoreState();
  updateStatus();
}

function renderCard(topic, type, isBonus) {
  const d = decisions[topic.id] || {};
  const stateClass = d.decision === 'opener' ? 'selected-opener' : d.decision === 'yes' ? 'selected-yes' : d.decision === 'no' ? 'selected-no' : '';

  let html = `<div class="topic-card ${stateClass}" id="card-${topic.id}">`;
  html += `<div class="topic-title">${topic.title}</div>`;
  html += `<div class="topic-summary">${topic.summary}</div>`;
  if (topic.hook) html += `<div class="topic-hook">${topic.hook}</div>`;

  if (topic.narratives) {
    const urls = topic.urls || {};
    html += '<div class="narratives">';
    html += `<div class="narrative prawica"><div class="label">Prawica ${urls.prawica ? '<a href="'+urls.prawica+'" target="_blank">\u2197 \u017ar\u00f3d\u0142o</a>' : ''}</div><div class="text">${topic.narratives.prawica}</div></div>`;
    html += `<div class="narrative lewica"><div class="label">Lewica ${urls.lewica ? '<a href="'+urls.lewica+'" target="_blank">\u2197 \u017ar\u00f3d\u0142o</a>' : ''}</div><div class="text">${topic.narratives.lewica}</div></div>`;
    html += `<div class="narrative libki"><div class="label">Libki ${urls.libki ? '<a href="'+urls.libki+'" target="_blank">\u2197 \u017ar\u00f3d\u0142o</a>' : ''}</div><div class="text">${topic.narratives.libki}</div></div>`;
    html += `<div class="narrative luka"><div class="label">Luka narracyjna ${urls.luka ? '<a href="'+urls.luka+'" target="_blank">\u2197 \u017ar\u00f3d\u0142o</a>' : ''}</div><div class="text">${topic.narratives.luka}</div></div>`;
    html += '</div>';
  }

  html += '<div class="decision-row">';
  if (!isBonus) {
    html += `<button class="decision-btn ${d.decision==='opener'?'active-opener':''}" onclick="setDecision('${topic.id}','opener')">OPENER</button>`;
  }
  html += `<button class="decision-btn ${d.decision==='yes'?'active-yes':''}" onclick="setDecision('${topic.id}','yes')">Bierzemy</button>`;
  html += `<button class="decision-btn ${d.decision==='no'?'active-no':''}" onclick="setDecision('${topic.id}','no')">Nie</button>`;
  html += '</div>';

  html += `
  <div class="notes-area">
    <textarea id="notes-${topic.id}" placeholder="Uwagi, angle, pomys\u0142..." oninput="saveNote('${topic.id}', this.value)">${d.notes || ''}</textarea>
  </div>`;

  html += '</div>';
  return html;
}

function setDecision(id, decision) {
  if (!decisions[id]) decisions[id] = {};
  decisions[id].decision = decisions[id].decision === decision ? null : decision;
  render();
}

function saveNote(id, value) {
  if (!decisions[id]) decisions[id] = {};
  decisions[id].notes = value;
}

function restoreState() {
  Object.keys(decisions).forEach(tid => {
    const el = document.getElementById('notes-' + tid);
    if (el && decisions[tid].notes) el.value = decisions[tid].notes;
  });
  const gen = document.getElementById('generalNotes');
  if (gen && window._generalNotes) gen.value = window._generalNotes;
}

function updateStatus() {
  const selected = Object.values(decisions).filter(d => d.decision === 'yes' || d.decision === 'opener').length;
  const opener = Object.values(decisions).filter(d => d.decision === 'opener').length;
  document.getElementById('statusCount').textContent = `${selected} temat\u00f3w wybranych` + (opener ? ` (${opener} opener)` : '');
}

function submitDecisions() {
  const brief = dashboardHistory[currentBriefIdx];
  window._generalNotes = document.getElementById('generalNotes')?.value || '';

  const output = {
    date: brief.date,
    submitted_at: new Date().toISOString(),
    topics: [],
    general_notes: window._generalNotes,
    opener: null,
    selected: [],
    rejected: []
  };

  const allTopics = [...brief.popularne_trendy, ...brief.discovery, ...brief.bonusy];
  allTopics.forEach(t => {
    const d = decisions[t.id] || {};
    output.topics.push({ id: t.id, title: t.title, decision: d.decision || 'undecided', notes: d.notes || '' });
    if (d.decision === 'opener') { output.opener = t.id; output.selected.push(t.id); }
    else if (d.decision === 'yes') { output.selected.push(t.id); }
    else if (d.decision === 'no') { output.rejected.push(t.id); }
  });

  const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'daylik_decisions.json';
  a.click();
  URL.revokeObjectURL(url);

  const banner = document.getElementById('successBanner');
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 4000);
}

document.addEventListener('input', (e) => {
  if (e.target.id === 'generalNotes') window._generalNotes = e.target.value;
});

renderSidebar();
render();
</script>

</html>
